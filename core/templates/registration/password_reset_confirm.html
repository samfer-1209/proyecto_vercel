{% extends 'core/base.html' %}
{% block title %}Restablecer contraseña - TaskHub{% endblock %}
{% block page_title %}Restablecer contraseña{% endblock %}
{% block content %}
<div class="form-panel auth-panel">
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="form-group">
            <label for="id_new_password1">Nueva contraseña</label>
            {{ form.new_password1 }}
        </div>
        <div class="form-group">
            <label for="id_new_password2">Repite contraseña</label>
            {{ form.new_password2 }}
        </div>
        <button type="submit" class="button button-primary">Guardar nueva contraseña</button>
    </form>
</div>
{% endblock %}
