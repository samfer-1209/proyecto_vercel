{% extends 'core/base.html' %}
{% block title %}Recuperar contraseña - TaskHub{% endblock %}
{% block page_title %}Recuperar contraseña{% endblock %}
{% block content %}
<div class="form-panel auth-panel">
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Correo electrónico</label>
            {{ form.email }}
        </div>
        <button type="submit" class="button button-primary">Enviar enlace</button>
    </form>
</div>
{% endblock %}
